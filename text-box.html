<!DOCTYPE html5>
<html>
  <head>
    <meta charset="utf-8" lang="en" />
    <title>Box Arranged</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      main {
        display: flex;
      }
      .box {
        display: flex;
        justify-content: center;
        align-items: center;

        width: 100px;
        height: 100px;
      }
      #box1 {
        background-color: red;
      }
      #box2 {
        background-color: green;
      }
      #box3 {
        background-color: blue;
      }
      h1 {
        color: white;
        font-family: "inter", sans-serif;
      }
    </style>
  </head>
  <body>
    <header></header>
    <main>
      <div id="box1" class="box"><h1>1</h1></div>
      <div id="box2" class="box"><h1>2</h1></div>
      <div id="box3" class="box"><h1>3</h1></div>
    </main>
    <footer></footer>
  </body>
</html>
